services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloxking-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /var/bloxking/dispute-evidence:/var/bloxking/dispute-evidence
